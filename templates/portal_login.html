<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntelliCare — Patient Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #e0f7fa 0%, #e3f2fd 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(10,37,64,0.12);
      padding: 48px;
      max-width: 420px;
      width: 100%;
    }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #00838f, #00bcd4);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 20px; color: white;
    }
    .logo-name { font-family: 'DM Serif Display', serif; font-size: 22px; color: #0a2540; }
    .logo-name span { color: #00bcd4; }

    .portal-badge {
      display: inline-block;
      background: #e0f7fa;
      color: #00838f;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    h1 { font-family: 'DM Serif Display', serif; font-size: 28px; color: #0a2540; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #8aa0b8; margin-bottom: 28px; line-height: 1.6; }

    .form-field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #4a6080;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d0dce8;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: #0a2540;
      outline: none;
      transition: all 0.2s;
      background: #f4f8fb;
    }

    input:focus {
      border-color: #00838f;
      background: white;
      box-shadow: 0 0 0 3px rgba(0,131,143,0.12);
    }

    input[name="pin"] {
      font-size: 22px;
      letter-spacing: 8px;
      text-align: center;
      font-family: 'DM Serif Display', serif;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1565c0, #00838f);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(21,101,192,0.3);
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(21,101,192,0.4); }

    .error {
      background: #fff3e0;
      border: 1px solid #ffcc80;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #e65100;
      margin-bottom: 20px;
    }

    .intake-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #8aa0b8;
    }

    .intake-link a { color: #00838f; text-decoration: none; font-weight: 500; }
    .intake-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">I</div>
      <div class="logo-name">Intelli<span>Care</span></div>
    </div>

    <div class="portal-badge">Patient Portal</div>
    <h1>Welcome back</h1>
    <p class="sub">Enter your name and the 6-digit PIN you received after your intake form.</p>

    {% if error %}
    <div class="error">⚠ {{ error }}</div>
    {% endif %}

    <form action="/portal/login" method="POST">
      <div class="form-field">
        <label>Your Full Name (First Last)</label>
        <input type="text" name="name" placeholder="Sarah Johnson" required autocomplete="name">
      </div>
      <div class="form-field">
        <label>Portal PIN</label>
        <input type="text" name="pin" placeholder="••••••" maxlength="6" required autocomplete="off" inputmode="numeric">
      </div>
      <button type="submit" class="btn">Sign In →</button>
    </form>

    <div class="intake-link">
      New patient? <a href="/intake">Fill out your intake form</a>
    </div>

    <div class="intake-link" style="margin-top:12px;">
      Staff member? <a href="/login">Go to Staff Login</a>
    </div>
  </div>
</body>
</html>
